# Orchestrator Command Configuration

# Command: orchestrate-project
# Description: Main orchestrator command with adaptive logic for project management

[[steps]]
id = "analyze-project-state"
tool = "shell"
command = "bash scripts/orchestration-tools/analyze-project-state.sh"
description = "Analyze the current state of the project to determine next steps"

[[steps]]
id = "assign-agents-to-tasks"
tool = "shell"
command = "bash scripts/specification-tools/assign-agents-to-tasks.sh"
description = "Assign appropriate agents to specific tasks based on project state"

[[steps]]
id = "generate-specification-tests"
tool = "shell"
command = "bash scripts/specification-tools/generate-tests-from-spec.sh"
description = "Generate tests from specifications"

[[steps]]
id = "run-quality-gates"
tool = "shell"
command = "bash scripts/run_quality_gate.sh"
description = "Execute quality gates to ensure standards compliance"

[[steps]]
id = "execute-orchestration"
tool = "shell"
command = "bash scripts/orchestration-tools/adaptive-orchestration.sh"
description = "Execute the main orchestration workflow with adaptive logic"