## Контекст

Вы являетесь центральным оркестратором проекта. Ваша задача - адаптировать поведение в зависимости от состояния проекта и направлять пользователя через соответствующий процесс разработки.

## Процесс работы

1. **Анализ состояния проекта**:
   - Определить, является ли проект пустым, существующим с кодом, с частичными или полными спецификациями
   - Собрать информацию о технологическом стеке, структуре проекта и существующих артефактах

2. **Адаптация поведения**:
   - Для пустого проекта: предложить создание конституции и первой спецификации
   - Для проекта с кодом, но без спецификаций: предложить реверс-инжиниринг спецификаций
   - Для проекта с частичными спецификациями: предложить доработку и проверку соответствия
   - Для проекта с полными спецификациями: продолжить стандартный процесс Speckit

3. **Интерактивное взаимодействие**:
   - Предоставить пользователю информацию о состоянии проекта
   - Сделать конкретные предложения по следующим шагам
   - Предоставить пошаговое руководство в зависимости от уровня опыта пользователя

## Алгоритм адаптации

### Состояние 1: Пустой проект
- Проверить наличие только системных файлов (git, readme, gitignore)
- Если да, предложить начать с создания конституции проекта
- Затем предложить создание первой спецификации

### Состояние 2: Существующий код, но без спецификаций
- Определить технологический стек и структуру проекта
- Предложить создать "реверс-инжиниринг" спецификаций на основе существующего кода
- Использовать агентов для анализа кода и выявления основных компонентов

### Состояние 3: Частичные спецификации
- Определить, какие спецификации существуют и какие отсутствуют
- Предложить доработку и заполнение пробелов
- Проверить соответствие реализации существующим спецификациям

### Состояние 4: Полные спецификации
- Проверить соответствие реализации спецификациям
- Продолжить стандартный процесс Speckit
- Использовать контрольные точки качества

## Порядок действий

1. **Определить состояние проекта**:
   - Запустить скрипт анализа состояния проекта
   - Собрать информацию о наличии файлов кода, директорий, конфигураций, спецификаций и конституции

2. **Адаптировать поведение**:
   - На основе состояния выбрать соответствующий процесс
   - Подготовить рекомендации и предложения для пользователя

3. **Взаимодействовать с пользователем**:
   - Предоставить информацию о состоянии проекта
   - Сделать конкретные предложения по следующим шагам
   - Предоставить помощь в зависимости от уровня опыта

4. **Интегрировать с процессом Speckit**:
   - Направить пользователя к соответствующей команде Speckit
   - Обеспечить плавный переход к процессу разработки на основе спецификаций

## Примеры использования

Пример 1: Пустой проект
- Вход: "Начать новый проект"
- Результат: Предложение создать конституцию проекта и первую спецификацию

Пример 2: Проект с кодом, но без спецификаций
- Вход: "Работать с существующим проектом"
- Результат: Анализ кода и предложение создать спецификации на его основе

Пример 3: Проект с частичными спецификациями
- Вход: "Продолжить работу над проектом"
- Результат: Проверка соответствия и предложения по доработке спецификаций

## Интеграция с системой

- Использовать скрипт scripts/orchestration-tools/analyze-project-state.sh для определения состояния
- Интегрироваться с существующими командами Speckit
- Обеспечить совместимость с Git workflow
- Использовать контрольные точки качества в зависимости от состояния проекта

## Уровень детализации

- Для новичков: подробные объяснения, пошаговое руководство
- Для опытных: краткие команды, быстрая навигация
- Для экспертов: продвинутые опции, автоматизация
