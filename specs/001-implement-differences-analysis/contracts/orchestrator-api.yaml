# Контракт API для оркестратора агентов

## Описание
Этот контракт определяет API для взаимодействия с оркестратором агентов, который управляет фазой планирования и координацией между различными агентами.

## Базовый URL
`/api/v1/orchestrator`

## Аутентификация
JWT-токен в заголовке `Authorization: Bearer {token}`

## Операции

### 1. Создание новой задачи оркестрации
- **POST** `/tasks`
- **Описание**: Создает новую задачу для оркестратора
- **Тело запроса**:
```json
{
  "taskId": "string",
  "taskType": "enum(plan|execute|validate)",
  "agentType": "enum(orc_*|work_*)",
  "domain": "string",
  "description": "string",
  "priority": "enum(low|medium|high|critical)",
  "deadline": "ISO8601 timestamp"
}
```
- **Ответ**:
  - 201 Created: `{ "taskId": "string", "status": "created", "createdAt": "ISO8601 timestamp" }`
  - 400 Bad Request: `{ "error": "string", "details": "object" }`
  - 401 Unauthorized: `{ "error": "Authentication required" }`

### 2. Получение статуса задачи
- **GET** `/tasks/{taskId}`
- **Описание**: Возвращает текущий статус задачи
- **Параметры пути**:
  - `taskId`: ID задачи
- **Ответ**:
  - 200 OK: `{ "taskId": "string", "status": "enum(created|assigned|in-progress|completed|failed)", "progress": "number", "result": "object", "updatedAt": "ISO8601 timestamp" }`
  - 401 Unauthorized: `{ "error": "Authentication required" }`
  - 404 Not Found: `{ "error": "Task not found" }`

### 3. Получение списка задач
- **GET** `/tasks`
- **Описание**: Возвращает список задач с возможностью фильтрации
- **Параметры запроса**:
  - `status`: enum(created|assigned|in-progress|completed|failed) - фильтр по статусу
  - `agentType`: string - фильтр по типу агента
  - `domain`: string - фильтр по домену
  - `limit`: number - ограничение количества результатов
  - `offset`: number - смещение для пагинации
- **Ответ**:
  - 200 OK: `{ "tasks": [{"taskId": "string", "status": "string", ...}], "total": "number" }`
  - 401 Unauthorized: `{ "error": "Authentication required" }`

### 4. Обновление статуса задачи (для агентов)
- **PUT** `/tasks/{taskId}/status`
- **Описание**: Агент обновляет статус своей задачи
- **Параметры пути**:
  - `taskId`: ID задачи
- **Тело запроса**:
```json
{
  "status": "enum(in-progress|completed|failed)",
  "progress": "number",
  "result": "object",
  "report": "string"
}
```
- **Ответ**:
  - 200 OK: `{ "taskId": "string", "status": "string", "updatedAt": "ISO8601 timestamp" }`
  - 400 Bad Request: `{ "error": "string" }`
  - 401 Unauthorized: `{ "error": "Authentication required" }`
  - 403 Forbidden: `{ "error": "Not authorized to update this task" }`

### 5. Создание нового агента (через meta-agent)
- **POST** `/agents`
- **Описание**: Создает нового агента через meta-agent
- **Тело запроса**:
```json
{
  "name": "string",
  "type": "enum(orc|work)",
  "domain": "string",
  "description": "string",
  "tools": ["string"],
  "model": "string"
}
```
- **Ответ**:
  - 201 Created: `{ "agentId": "string", "fileName": "string", "status": "created" }`
  - 400 Bad Request: `{ "error": "string", "details": "object" }`
  - 401 Unauthorized: `{ "error": "Authentication required" }`

## Обработка ошибок
- Все ошибки возвращаются в формате: `{ "error": "string", "code": "number", "timestamp": "ISO8601 timestamp" }`
- Коды ошибок соответствуют HTTP статусам
- Дополнительная информация может быть в поле `details`

## Ограничения
- Максимальный размер тела запроса: 10MB
- Ограничение частоты запросов: 1000 в минуту на токен
- Время жизни задачи: 7 дней без обновления статуса