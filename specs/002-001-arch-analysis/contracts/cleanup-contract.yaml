# OpenAPI Contract: /health-cleanup command

openapi: 3.0.0
info:
  title: Health Cleanup Command
  version: 1.0.0
  description: API contract for the /health-cleanup command that identifies and removes dead code

paths:
  /commands/health-cleanup:
    post:
      summary: Initiate cleanup process
      description: Starts a process to identify and remove dead code, unused imports, and other code artifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupRequest'
      responses:
        '200':
          description: Cleanup process initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error during cleanup

components:
  schemas:
    CleanupRequest:
      type: object
      properties:
        cleanup_types:
          type: array
          items:
            type: string
            enum: [unused_imports, commented_code, unreachable_code, unused_variables, debug_artifacts]
          description: Types of cleanup to perform
        preview_only:
          type: boolean
          default: false
          description: Whether to only preview changes without applying them
        exclude_patterns:
          type: array
          items:
            type: string
          description: Patterns of files or directories to exclude from cleanup
      required:
        - cleanup_types

    CleanupResponse:
      type: object
      properties:
        cleanup_id:
          type: string
          description: Unique identifier for the initiated cleanup
        status:
          type: string
          enum: [initiated, in_progress, completed, failed]
          description: Current status of the cleanup
        estimated_completion:
          type: string
          format: date-time
          description: Estimated time for cleanup completion
        report_location:
          type: string
          description: Path to the cleanup report once completed
        changes_identified:
          type: array
          items:
            $ref: '#/components/schemas/CleanupChange'
    
    CleanupChange:
      type: object
      properties:
        file_path:
          type: string
          description: Path to the file containing the change
        line_numbers:
          type: array
          items:
            type: integer
          description: Line numbers affected by the change
        change_type:
          type: string
          enum: [removal, modification]
          description: Type of change to be applied
        description:
          type: string
          description: Description of the change to be made