# OpenAPI Contract: /health-security command

openapi: 3.0.0
info:
  title: Health Security Command
  version: 1.0.0
  description: API contract for the /health-security command that scans the codebase for security vulnerabilities

paths:
  /commands/health-security:
    post:
      summary: Initiate security scan
      description: Starts a comprehensive security scan of the codebase to identify vulnerabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityScanRequest'
      responses:
        '200':
          description: Security scan initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityScanResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error during scan

components:
  schemas:
    SecurityScanRequest:
      type: object
      properties:
        scope:
          type: string
          enum: [full, partial, specific]
          description: Scope of the security scan
        targets:
          type: array
          items:
            type: string
          description: Specific files or directories to scan (required if scope is specific)
        priority:
          type: string
          enum: [low, medium, high, critical]
          description: Priority level for vulnerability detection
      required:
        - scope

    SecurityScanResponse:
      type: object
      properties:
        scan_id:
          type: string
          description: Unique identifier for the initiated scan
        status:
          type: string
          enum: [initiated, in_progress, completed, failed]
          description: Current status of the scan
        estimated_completion:
          type: string
          format: date-time
          description: Estimated time for scan completion
        report_location:
          type: string
          description: Path to the security report once completed